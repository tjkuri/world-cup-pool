name: fetch-results

on:
  schedule:
    # Every 2 hours, on the hour, UTC.
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch script
        run: node scripts/fetch-results.mjs

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain public/results.json)" ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add public/results.json
            git commit -m "results update"
            git push
          else
            echo "No public/results.json changes."
          fi
