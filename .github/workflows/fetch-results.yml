name: fetch-results

on:
  # Tournament over (2026-07); the scheduled poll is retired so it stops
  # committing no-op results/history pairs every 2h. Re-enable by uncommenting
  # the schedule block if a future tournament reuses this repo.
  # schedule:
  #   # Every 2 hours, on the hour, UTC.
  #   - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # fetch-depth: 0 — build-history.mjs walks the FULL commit history of
      # public/results.json; a shallow clone would only see the latest snapshot.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch script
        run: node scripts/fetch-results.mjs

      - name: Commit results, rebuild The Gap history, push
        run: |
          if [[ -n "$(git status --porcelain public/results.json)" ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add public/results.json
            git commit -m "results update"
            # Regenerate history.json from the full committed results timeline so
            # The Gap stays in sync with the leaderboard. Best-effort: if the
            # submissions endpoint hiccups, still push the results commit.
            if node scripts/build-history.mjs; then
              git add public/history.json
              git commit -m "history update" || echo "history.json unchanged"
            else
              echo "build-history failed; pushing results only"
            fi
            git push
          else
            echo "No public/results.json changes."
          fi
